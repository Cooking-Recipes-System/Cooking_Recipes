<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Recipewebsite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">🍳 Recipewebsite</div>
  </nav>

  <!-- Login Form -->
  <main class="recipe-container">
    <div class="recipe-card">
      <h1 class="recipe-title">Welcome back</h1>
      <p class="recipe-subtitle">Sign in to your account</p>

      <div id="alert" class="alert hidden"></div>

      <form id="loginForm" class="recipe-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              👁
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          Sign In
        </button>
      </form>

      <p class="recipe-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </div>
  </main>

  <script>
    const API = '/Cooking_Recipes/backend';

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    // Toggle password visibility
    document.querySelector('.toggle-password').addEventListener('click', function () {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.textContent = input.type === 'password' ? '👁' : '🙈';
    });

    // Show alert
    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
    }

    // Handle form submit
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');

      if (!email || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API}/login.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.message || 'Login failed.');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';

      } catch (err) {
        showAlert('Could not connect to server. Make sure the backend is running.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>

</body>
</html>
