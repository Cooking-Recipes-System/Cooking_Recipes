<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — RecipeWebsite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">🍳 RecipeWebsite</div>
  </nav>

  <!-- Register Form -->
  <main class="recipe-container">
    <div class="recipe-card">
      <h1 class="recipe-title">Create account</h1>
      <p class="recipe-subtitle">Sign up to get started</p>

      <div id="alert" class="alert hidden"></div>

      <form id="registerForm" class="recipe-form" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="John Doe"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Min. 6 characters"
              required
              autocomplete="new-password"
            />
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              👁
            </button>
          </div>
          <div class="password-strength" id="strengthBar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat your password"
            required
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          Create Account
        </button>
      </form>

      <p class="recipe-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </main>

  <script>
    const API = '/Cooking_Recipes/backend';

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    // Toggle password visibility
    document.querySelector('.toggle-password').addEventListener('click', function () {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.textContent = input.type === 'password' ? '👁' : '🙈';
    });

    // Password strength meter
    document.getElementById('password').addEventListener('input', function () {
      const val = this.value;
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');

      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
      const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
      const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];

      fill.style.width = widths[strength];
      fill.style.background = colors[strength];
      label.textContent = val.length > 0 ? levels[strength] : '';
      label.style.color = colors[strength];
    });

    // Show alert
    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
    }

    // Handle form submit
    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');

      if (!name || !email || !password || !confirmPassword) {
        showAlert('Please fill in all fields.');
        return;
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters.');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('Passwords do not match.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(`${API}/register.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.message || 'Registration failed.');
          return;
        }

        showAlert('Account created! Redirecting to login...', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);

      } catch (err) {
        showAlert('Could not connect to server. Make sure the backend is running.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>

</body>
</html>
